name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    env:
      TEAM_ID: V5XV3994L8
      KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Resolve SPM packages first, then strip the illegal underscore from
      # FFmpegKit's libshaderc_combined CFBundleIdentifier. Must happen BEFORE
      # archive: ProcessXCFramework extracts the slice early in the build, so a
      # preBuild script fixes it too late (embed copies the unfixed extract).
      - name: Resolve packages and fix framework bundle ids
        run: |
          xcodebuild -project Dobby.xcodeproj -scheme Dobby \
            -derivedDataPath "$RUNNER_TEMP/DD" -resolvePackageDependencies
          find "$RUNNER_TEMP/DD/SourcePackages/checkouts/FFmpegKit" \
            -name Info.plist -path '*.framework/*' | while IFS= read -r p; do
            id="$(plutil -extract CFBundleIdentifier raw "$p" 2>/dev/null)" || continue
            case "$id" in *_*)
              chmod u+w "$(dirname "$p")" "$p"
              plutil -replace CFBundleIdentifier -string "${id//_/-}" "$p" && echo "fixed $id";;
            esac
          done

      - name: Write App Store Connect API key
        env:
          KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"

      - name: Import distribution certificate
        env:
          CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Archive
        run: |
          xcodebuild archive \
            -project Dobby.xcodeproj -scheme Dobby -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/DD" \
            -archivePath build/Dobby.xcarchive \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="$(date +%Y%m%d%H%M)" \
            -allowProvisioningUpdates

      - name: Export .ipa
        run: |
          cat > "$RUNNER_TEMP/export.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/Dobby.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist "$RUNNER_TEMP/export.plist" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file "$(ls build/export/*.ipa | head -1)" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"
