name: Dobby
options:
  bundleIdPrefix: com.solarflare
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main
targets:
  Dobby:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - Dobby
    dependencies:
      - package: KSPlayer
        product: KSPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solarflare.dobby
        PRODUCT_NAME: Dobby
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Dobby/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Dobby
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Dobby/Dobby.entitlements
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - path: scripts/fix-bundle-ids.sh
        name: Fix framework bundle ids
      - path: scripts/deepen-macos-frameworks.sh
        name: Deepen macOS FFmpeg frameworks
